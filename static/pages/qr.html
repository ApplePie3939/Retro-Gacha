<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRコード読み取り - 古町ガチャ</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="css/retro.css">
    <style>
        /* QR特有のスタイル */
        #reader {
            width: 100%;
            max-width: 500px;
            background: #fff;
            border: 3px double #8b4513;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 8px 8px 0px rgba(139, 69, 19, 0.1);
            margin-bottom: 30px;
            padding: 10px;
        }
        
        /* html5-qrcodeが作成するボタンなどの上書き */
        #reader button {
            background: #a04040 !important;
            color: white !important;
            border: none !important;
            padding: 10px 20px !important;
            border-radius: 4px !important;
            cursor: pointer !important;
            margin: 5px !important;
            font-family: inherit !important;
            font-weight: bold !important;
            box-shadow: 4px 4px 0px #5d2e0d !important;
            transition: all 0.2s !important;
        }
        #reader button:hover {
            transform: translate(2px, 2px) !important;
            box-shadow: 2px 2px 0px #5d2e0d !important;
        }
        
        #reader select {
            padding: 8px;
            border-radius: 4px;
            background: #fff;
            color: #333;
            border: 1px solid #8b4513;
            margin-bottom: 10px;
            font-family: inherit;
        }

        /* 結果メッセージ */
        #result-message {
            max-width: 500px;
            width: 100%;
            padding: 20px;
            border-radius: 4px;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            display: none;
            border: 3px double #8b4513;
            background: #fff;
            box-shadow: 6px 6px 0px rgba(139, 69, 19, 0.1);
        }
        .success {
            color: #2e5a2e;
            border-color: #2e5a2e !important;
        }
        .error {
            color: #a04040;
            border-color: #a04040 !important;
        }

        .desc {
            margin-bottom: 30px;
            color: #444;
            text-align: center;
            font-weight: bold;
        }
        
        .qr-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 QRコード読み取り</h1>
        <div class="user-info">
            <span id="coinsDisplay" class="coin-display">💰 ?</span>
            <a href="gacha.html" class="retro-btn btn-secondary" style="padding: 6px 12px; font-size: 0.85rem;">戻る</a>
        </div>
    </div>

    <div class="container qr-container">
        <h2 class="retro-title">店舗を探してコインを獲得</h2>
        <p class="desc">お店のQRコードをスキャンすると、<br>ガチャを回せるコインが進呈されます。</p>

        <div id="reader"></div>

        <div id="result-message"></div>
    </div>

    <script>
        // ログインチェックとコイン取得
        async function fetchUserData() {
            try {
                const res = await fetch('/api/user.php');
                const data = await res.json();
                if (!data.logged_in) {
                    window.location.href = 'login.html';
                    return;
                }
                document.getElementById('coinsDisplay').textContent = `💰 ${data.user.coins} コイン`;
            } catch (err) {
                window.location.href = 'login.html';
            }
        }
        fetchUserData();

        // QRコードリーダーの初期化
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { 
                fps: 10, 
                qrbox: {width: 250, height: 250},
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            },
            /* verbose= */ false);

        let isScanning = true;

        async function onScanSuccess(decodedText, decodedResult) {
            if (!isScanning) return;
            isScanning = false; // 一度スキャンしたら連続送信を防ぐ
            
            // html5-qrcodeのスキャンを一時停止
            html5QrcodeScanner.pause();

            let shopId = null;

            // QRコードのフォーマットを解析
            // パターン1: JSON形式 {"shop_id": 1}
            try {
                const data = JSON.parse(decodedText);
                if (data.shop_id) shopId = data.shop_id;
            } catch (e) {
                // パターン2: 直接ID (例: "1")
                if (!isNaN(decodedText)) {
                    shopId = parseInt(decodedText);
                } 
                // パターン3: URL等から抽出 (今回は省略、JSONか数値のみ対応)
            }

            const msgDiv = document.getElementById('result-message');
            msgDiv.style.display = 'block';

            if (!shopId) {
                msgDiv.className = 'error';
                msgDiv.textContent = '無効なQRコードです';
                setTimeout(() => {
                    msgDiv.style.display = 'none';
                    isScanning = true;
                    html5QrcodeScanner.resume();
                }, 3000);
                return;
            }

            // APIに送信
            try {
                const res = await fetch('/api/scan_qr.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ shop_id: shopId })
                });
                const data = await res.json();

                if (data.success) {
                    msgDiv.className = 'success';
                    msgDiv.textContent = data.message;
                    document.getElementById('coinsDisplay').textContent = `💰 ${data.coins} コイン`;
                    
                    // 成功時は数秒後に再開（またはそのまま）
                    setTimeout(() => {
                        msgDiv.style.display = 'none';
                        isScanning = true;
                        html5QrcodeScanner.resume();
                    }, 5000);
                } else {
                    msgDiv.className = 'error';
                    msgDiv.textContent = data.message;
                    
                    setTimeout(() => {
                        msgDiv.style.display = 'none';
                        isScanning = true;
                        html5QrcodeScanner.resume();
                    }, 3000);
                }
            } catch (err) {
                msgDiv.className = 'error';
                msgDiv.textContent = '通信エラーが発生しました';
                setTimeout(() => {
                    msgDiv.style.display = 'none';
                    isScanning = true;
                    html5QrcodeScanner.resume();
                }, 3000);
            }
        }

        function onScanFailure(error) {
            // エラーを無視（通常のスキャン失敗フレーム）
        }

        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        // html5-qrcodeが動的に生成するUIの日本語化
        const observer = new MutationObserver(() => {
            const startBtn = document.getElementById('html5-qrcode-button-camera-start');
            if (startBtn && startBtn.textContent === "Start Scanning") {
                startBtn.textContent = "スキャン開始";
            }
            const stopBtn = document.getElementById('html5-qrcode-button-camera-stop');
            if (stopBtn && stopBtn.textContent === "Stop Scanning") {
                stopBtn.textContent = "スキャン停止";
            }
            const permBtn = document.getElementById('html5-qrcode-button-camera-permission');
            if (permBtn && permBtn.textContent === "Request Camera Permissions") {
                permBtn.textContent = "カメラの使用を許可";
            }
        });
        observer.observe(document.getElementById('reader'), { childList: true, subtree: true });
    </script>
</body>
</html>
