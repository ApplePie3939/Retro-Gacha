<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRコード読み取り - 古町ガチャ</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        /* ヘッダー */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: #16213e;
            border-bottom: 1px solid #2a2a4a;
        }
        .header h1 { font-size: 1.2rem; color: #e94560; }
        .header .user-info { display: flex; align-items: center; gap: 12px; color: #aaa; }
        
        .header a.back-btn {
            padding: 8px 16px;
            background: transparent;
            color: #ccc;
            border: 1px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: none;
        }
        .header a.back-btn:hover { background: #333; }

        /* メインコンテンツ */
        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        
        h2 {
            margin-bottom: 20px;
            color: #f5a623;
        }
        
        .desc {
            margin-bottom: 30px;
            color: #ccc;
            text-align: center;
        }

        #reader {
            width: 100%;
            max-width: 500px;
            background: #16213e;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        
        #reader button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        #reader select {
            padding: 8px;
            border-radius: 5px;
            background: #333;
            color: white;
            border: 1px solid #555;
            margin-bottom: 10px;
        }

        /* 結果メッセージ */
        #result-message {
            max-width: 500px;
            width: 100%;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            display: none;
        }
        .success {
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }
        .error {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 QRコード読み取り</h1>
        <div class="user-info">
            <span id="coinsDisplay">💰 ?</span>
            <a href="gacha.html" class="back-btn">ガチャへ戻る</a>
        </div>
    </div>

    <div class="main">
        <h2>店舗を見つけてコインをGET！</h2>
        <p class="desc">お店にあるQRコードをスキャンすると、ガチャに使えるコインがもらえます。</p>

        <div id="reader"></div>

        <div id="result-message"></div>
    </div>

    <script>
        // ログインチェックとコイン取得
        async function fetchUserData() {
            try {
                const res = await fetch('/api/user.php');
                const data = await res.json();
                if (!data.logged_in) {
                    window.location.href = 'login.html';
                    return;
                }
                document.getElementById('coinsDisplay').textContent = `💰 ${data.user.coins} コイン`;
            } catch (err) {
                window.location.href = 'login.html';
            }
        }
        fetchUserData();

        // QRコードリーダーの初期化
        const html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { 
                fps: 10, 
                qrbox: {width: 250, height: 250},
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            },
            /* verbose= */ false);

        let isScanning = true;

        async function onScanSuccess(decodedText, decodedResult) {
            if (!isScanning) return;
            isScanning = false; // 一度スキャンしたら連続送信を防ぐ
            
            // html5-qrcodeのスキャンを一時停止
            html5QrcodeScanner.pause();

            let shopId = null;

            // QRコードのフォーマットを解析
            // パターン1: JSON形式 {"shop_id": 1}
            try {
                const data = JSON.parse(decodedText);
                if (data.shop_id) shopId = data.shop_id;
            } catch (e) {
                // パターン2: 直接ID (例: "1")
                if (!isNaN(decodedText)) {
                    shopId = parseInt(decodedText);
                } 
                // パターン3: URL等から抽出 (今回は省略、JSONか数値のみ対応)
            }

            const msgDiv = document.getElementById('result-message');
            msgDiv.style.display = 'block';

            if (!shopId) {
                msgDiv.className = 'error';
                msgDiv.textContent = '無効なQRコードです';
                setTimeout(() => {
                    msgDiv.style.display = 'none';
                    isScanning = true;
                    html5QrcodeScanner.resume();
                }, 3000);
                return;
            }

            // APIに送信
            try {
                const res = await fetch('/api/scan_qr.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ shop_id: shopId })
                });
                const data = await res.json();

                if (data.success) {
                    msgDiv.className = 'success';
                    msgDiv.textContent = data.message;
                    document.getElementById('coinsDisplay').textContent = `💰 ${data.coins} コイン`;
                    
                    // 成功時は数秒後に再開（またはそのまま）
                    setTimeout(() => {
                        msgDiv.style.display = 'none';
                        isScanning = true;
                        html5QrcodeScanner.resume();
                    }, 5000);
                } else {
                    msgDiv.className = 'error';
                    msgDiv.textContent = data.message;
                    
                    setTimeout(() => {
                        msgDiv.style.display = 'none';
                        isScanning = true;
                        html5QrcodeScanner.resume();
                    }, 3000);
                }
            } catch (err) {
                msgDiv.className = 'error';
                msgDiv.textContent = '通信エラーが発生しました';
                setTimeout(() => {
                    msgDiv.style.display = 'none';
                    isScanning = true;
                    html5QrcodeScanner.resume();
                }, 3000);
            }
        }

        function onScanFailure(error) {
            // エラーを無視（通常のスキャン失敗フレーム）
        }

        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        // html5-qrcodeが動的に生成するUIの日本語化
        const observer = new MutationObserver(() => {
            const startBtn = document.getElementById('html5-qrcode-button-camera-start');
            if (startBtn && startBtn.textContent === "Start Scanning") {
                startBtn.textContent = "スキャン開始";
            }
            const stopBtn = document.getElementById('html5-qrcode-button-camera-stop');
            if (stopBtn && stopBtn.textContent === "Stop Scanning") {
                stopBtn.textContent = "スキャン停止";
            }
            const permBtn = document.getElementById('html5-qrcode-button-camera-permission');
            if (permBtn && permBtn.textContent === "Request Camera Permissions") {
                permBtn.textContent = "カメラの使用を許可";
            }
        });
        observer.observe(document.getElementById('reader'), { childList: true, subtree: true });
    </script>
</body>
</html>
