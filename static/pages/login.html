<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - 古町ガチャ</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="card">
            <h1 class="brand-logo">🔑 ログイン</h1>
            <p class="subtitle">古町レトロ・ガチャウォーク</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">ユーザー名</label>
                    <input type="text" id="username" name="username" required placeholder="ユーザー名を入力">
                </div>

                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" name="password" required placeholder="パスワードを入力">
                </div>

                <button type="submit" class="btn-submit">ログイン</button>
            </form>

            <div id="message" class="message"></div>

            <div class="links">
                <p>アカウントがない方は <a href="register.html">新規登録</a></p>
            </div>
        </div>
    </div>

    <script>
        // ログイン処理のロジック
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const msgEl = document.getElementById('message');
            msgEl.className = 'message'; // リセット

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                // パスはディレクトリ構造に合わせて調整（例: ../api/login.php）
                const res = await fetch('../api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    msgEl.className = 'message success';
                    msgEl.textContent = 'ログイン成功！リダイレクト中...';
                    setTimeout(() => { window.location.href = 'gacha.html'; }, 1000);
                } else {
                    msgEl.className = 'message error';
                    msgEl.textContent = data.message || 'ログインに失敗しました';
                }
            } catch (err) {
                msgEl.className = 'message error';
                msgEl.textContent = '通信エラーが発生しました';
            }
        });
    </script>
</body>
</html>
