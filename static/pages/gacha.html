<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ガチャ - 古町ガチャ</title>
    <link rel="stylesheet" href="css/retro.css">
    <style>
        /* ガチャ特有のスタイル */
        .gacha-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ガチャボタン：千社札やレトロな機械をイメージ */
        .gacha-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: #a04040;
            border: 6px double #fff;
            color: #fff;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 8px 8px 0px #5d2e0d;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            line-height: 1.2;
        }
        .gacha-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 6px 6px 0px #5d2e0d;
        }
        .gacha-btn:active { 
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0px #5d2e0d;
        }
        .gacha-btn.spinning {
            animation: spin 0.5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 結果カード：掛け軸や看板のイメージ */
        .result-card {
            display: none;
            animation: fadeIn 0.8s ease-out;
            width: 100%;
            max-width: 500px;
        }
        .result-card.show { display: block; }
        
        .result-card .shop-name {
            font-size: 1.8rem;
            color: #a04040;
            margin-bottom: 12px;
            text-align: center;
            border-bottom: 2px solid #a04040;
            padding-bottom: 8px;
        }
        .result-card .shop-genre {
            display: inline-block;
            background: #8b4513;
            color: #fff;
            padding: 4px 16px;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }
        .result-card .shop-image {
            width: 100%;
            height: 240px;
            background: #eee;
            border: 2px solid #8b4513;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            overflow: hidden;
        }
        .result-card .shop-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .result-card .shop-desc {
            color: #444;
            line-height: 1.8;
            margin-bottom: 16px;
            font-weight: bold;
        }
        .result-card .shop-address {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 20px;
            font-style: italic;
        }

        .action-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- ヘッダー -->
    <div class="header">
        <h1>🎰 古町ガチャ</h1>
        <div class="user-info">
            <span id="usernameDisplay" style="font-weight: bold;">---</span>
            <span id="coinsDisplay" class="coin-display">💰 ---</span>
            <button id="logoutBtn" class="retro-btn btn-secondary" style="padding: 6px 12px; font-size: 0.85rem;">ログアウト</button>
        </div>
    </div>

    <!-- メインコンテンツ -->
    <div class="container gacha-container">
        <div class="action-buttons">
            <a href="qr.html" class="retro-btn btn-success">📷 コインを獲得する</a>
            <a href="coupons.html" class="retro-btn btn-warning">🎟️ クーポンを確認</a>
        </div>

        <button class="gacha-btn" id="gachaBtn">
            <span>🎰</span>
            <span>ガチャを</span>
            <span>回す！</span>
        </button>

        <!-- 結果表示エリア -->
        <div class="retro-card result-card" id="resultCard">
            <div style="text-align: center;">
                <div class="shop-genre" id="shopGenre"></div>
            </div>
            <div class="shop-name" id="shopName"></div>
            <div class="shop-image" id="shopImage">
                <span>画像準備中</span>
            </div>
            <div class="shop-desc" id="shopDesc"></div>
            <div class="shop-address" id="shopAddress"></div>
            <div style="text-align: center;">
                <a class="retro-btn btn-primary" id="mapBtn" href="#" target="_blank">📍 地図を見る</a>
            </div>
        </div>
    </div>

    <script>
        // ----- ログイン状態チェック -----
        async function checkLogin() {
            try {
                const res = await fetch('/api/user.php');
                const data = await res.json();
                if (!data.logged_in) {
                    window.location.href = 'login.html';
                    return;
                }
                document.getElementById('usernameDisplay').textContent = data.user.username;
                document.getElementById('coinsDisplay').textContent = `💰 ${data.user.coins}`;
            } catch (err) {
                window.location.href = 'login.html';
            }
        }
        checkLogin();

        // ----- ログアウト -----
        document.getElementById('logoutBtn').addEventListener('click', async function() {
            await fetch('/api/logout.php');
            window.location.href = 'login.html';
        });

        // ----- ガチャを回す -----
        document.getElementById('gachaBtn').addEventListener('click', async function() {
            const btn = this;
            btn.classList.add('spinning');

            try {
                const res = await fetch('/api/gacha.php');
                const data = await res.json();

                if (data.success) {
                    const shop = data.shop;

                    // 結果を表示
                    document.getElementById('shopName').textContent = shop.name;
                    document.getElementById('shopGenre').textContent = shop.genre;
                    document.getElementById('shopDesc').textContent = shop.description;
                    document.getElementById('shopAddress').textContent = '📍 ' + shop.address;

                    // 画像
                    const imgContainer = document.getElementById('shopImage');
                    imgContainer.innerHTML = '<img src="/' + shop.image + '" alt="' + shop.name + '" onerror="this.parentElement.innerHTML=\'<span>画像準備中</span>\'">';

                    // Google Map リンク
                    const mapUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(shop.address);
                    document.getElementById('mapBtn').href = mapUrl;

                    // カード表示
                    const card = document.getElementById('resultCard');
                    card.classList.remove('show');
                    setTimeout(() => card.classList.add('show'), 100);
                } else {
                    alert(data.message);
                }
            } catch (err) {
                alert('通信エラーが発生しました');
            }

            setTimeout(() => btn.classList.remove('spinning'), 500);
        });
    </script>
</body>
</html>
