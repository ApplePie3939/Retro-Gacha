<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クーポン - 古町ガチャ</title>
    <link rel="stylesheet" href="css/retro.css">
    <style>
        /* クーポン特有のスタイル */
        .coupon-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        
        .coupon-card {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 200px;
        }

        .coupon-name {
            font-size: 1.3rem;
            color: #a04040;
            margin-bottom: 8px;
            font-weight: bold;
            border-bottom: 1px solid #8b4513;
            padding-bottom: 4px;
        }
        .coupon-desc {
            color: #444;
            font-size: 0.95rem;
            margin-bottom: 16px;
            line-height: 1.6;
            flex-grow: 1;
        }
        .coupon-price {
            color: #8b4513;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 12px;
            text-align: right;
        }
        
        .my-coupon-card {
            border-color: #2e5a2e; /* 獲得済みは少し違う色味（緑系）に */
        }
        .my-coupon-date {
            font-size: 0.85rem;
            color: #666;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #8b4513;
            font-style: italic;
        }
        
        .buy-btn {
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎟️ クーポン交換所</h1>
        <div class="user-info">
            <span id="coinsDisplay" class="coin-display">💰 ---</span>
            <a href="gacha.html" class="retro-btn btn-secondary" style="padding: 6px 12px; font-size: 0.85rem;">戻る</a>
        </div>
    </div>

    <div class="container">
        <h2 class="retro-title">購入可能なクーポン</h2>
        <div class="coupon-list" id="availableCoupons">
            <p style="color:#666;">読み込み中...</p>
        </div>

        <h2 class="retro-title" style="margin-top: 60px;">マイクーポン (所持済み)</h2>
        <div class="coupon-list" id="myCoupons">
            <p style="color:#666;">読み込み中...</p>
        </div>
    </div>

    <script>
        let currentUserCoins = 0;

        async function init() {
            try {
                const res = await fetch('/api/user.php');
                const data = await res.json();
                if (!data.logged_in) {
                    window.location.href = 'login.html';
                    return;
                }
                currentUserCoins = data.user.coins;
                updateCoinDisplay(currentUserCoins);
                
                await Promise.all([loadAvailableCoupons(), loadMyCoupons()]);
            } catch (err) {
                console.error(err);
                alert('エラーが発生しました。再度ログインしてください。');
            }
        }

        function updateCoinDisplay(coins) {
            document.getElementById('coinsDisplay').textContent = `💰 ${coins}`;
        }

        async function loadAvailableCoupons() {
            try {
                const res = await fetch('/api/coupons.php');
                const data = await res.json();
                const container = document.getElementById('availableCoupons');
                container.innerHTML = '';

                if (data.success && data.coupons && data.coupons.length > 0) {
                    data.coupons.forEach(coupon => {
                        const canBuy = currentUserCoins >= coupon.coin_price;
                        
                        const div = document.createElement('div');
                        div.className = 'retro-card coupon-card';
                        div.innerHTML = `
                            <div>
                                <div class="coupon-name">${escapeHTML(coupon.name)}</div>
                                <div class="coupon-desc">${escapeHTML(coupon.description)}</div>
                            </div>
                            <div>
                                <div class="coupon-price">💰 ${coupon.coin_price} コイン</div>
                                <button class="retro-btn btn-primary buy-btn" ${canBuy ? '' : 'disabled'} onclick="buyCoupon(${coupon.id}, '${escapeHTML(coupon.name)}', ${coupon.coin_price})">
                                    ${canBuy ? '購入する' : 'コイン不足'}
                                </button>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = '<p style="color:#888;">現在購入できるクーポンはありません。</p>';
                }
            } catch(e) { 
                console.error(e); 
                document.getElementById('availableCoupons').innerHTML = '<p style="color:#e94560;">クーポンの読み込みに失敗しました。</p>';
            }
        }

        async function loadMyCoupons() {
            try {
                const res = await fetch('/api/my_coupons.php');
                const data = await res.json();
                const container = document.getElementById('myCoupons');
                container.innerHTML = '';

                if (data.success && data.my_coupons && data.my_coupons.length > 0) {
                    data.my_coupons.forEach(uc => {
                        const date = new Date(uc.created_at).toLocaleString('ja-JP');
                        const div = document.createElement('div');
                        div.className = 'retro-card coupon-card my-coupon-card';
                        div.innerHTML = `
                            <div>
                                <div class="coupon-name">${escapeHTML(uc.name)}</div>
                                <div class="coupon-desc">${escapeHTML(uc.description)}</div>
                            </div>
                            <div class="my-coupon-date">
                                獲得日: ${date}<br>
                                状態: <b>${uc.is_used ? '<span style="color:#888;">使用済み</span>' : '<span style="color:#2e5a2e;">未使用</span>'}</b>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                } else {
                    container.innerHTML = '<p style="color:#888;">まだクーポンを持っていません。</p>';
                }
            } catch(e) { 
                console.error(e); 
                document.getElementById('myCoupons').innerHTML = '<p style="color:#e94560;">クーポンの読み込みに失敗しました。</p>';
            }
        }

        async function buyCoupon(couponId, name, price) {
            if (!confirm(`「${name}」を ${price} コインで購入しますか？`)) {
                return;
            }

            try {
                const res = await fetch('/api/buy_coupon.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ coupon_id: couponId })
                });
                const data = await res.json();

                if (data.success) {
                    alert(data.message);
                    currentUserCoins = data.remaining_coins;
                    updateCoinDisplay(currentUserCoins);
                    await Promise.all([loadAvailableCoupons(), loadMyCoupons()]);
                } else {
                    alert('エラー: ' + data.message);
                }
            } catch (err) {
                console.error(err);
                alert('通信エラーが発生しました');
            }
        }

        function escapeHTML(str) {
            return String(str).replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        init();
    </script>
</body>
</html>
