<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録 - 古町ガチャ</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="card">
            <h1 class="brand-logo">📝 新規登録</h1>
            <p class="subtitle">古町レトロ・ガチャウォーク</p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">ユーザー名</label>
                    <input type="text" id="username" name="username" required placeholder="好きなユーザー名">
                </div>

                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="password" name="password" required placeholder="パスワードを設定">
                </div>

                <button type="submit" class="btn-submit">登録する</button>
            </form>

            <div id="message" class="message"></div>

            <div class="links">
                <p>すでにアカウントをお持ちの方は <a href="login.html">ログイン</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const msgEl = document.getElementById('message');
            msgEl.className = 'message';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                // APIへのパスに注意（../を忘れずに）
                const res = await fetch('../api/register.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    msgEl.className = 'message success';
                    msgEl.textContent = '登録成功！ガチャ画面へ移動します...';
                    setTimeout(() => { window.location.href = 'gacha.html'; }, 1000);
                } else {
                    msgEl.className = 'message error';
                    msgEl.textContent = data.message || '登録に失敗しました';
                }
            } catch (err) {
                msgEl.className = 'message error';
                msgEl.textContent = '通信エラーが発生しました';
            }
        });
    </script>
</body>
</html>
