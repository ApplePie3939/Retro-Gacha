<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古町レトロ・ガチャウォーク</title>
    <style>
        /* レイアウトの数値はそのままに、色と質感のみ変更 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Sawarabi Mincho", "Hiragino Mincho ProN", "serif";
            /* 和紙のテクスチャとベージュ系背景 */
            background-color: #f4f1ea;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 40px;
            /* 蔵の漆喰をイメージした白背景と二重線 */
            background: #fff;
            border: 3px double #8b4513;
            border-radius: 4px;
            box-shadow: 8px 8px 0px rgba(139, 69, 19, 0.1);
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            /* グラデーションを廃止し、渋いえんじ色の一色に */
            color: #a04040;
            border-bottom: 2px solid #a04040;
        }
        p {
            color: #666; /* 落ち着いたグレー */
            margin-bottom: 30px;
            font-weight: bold;
        }
        .buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        a {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 4px; /* 角丸を小さくして古風に */
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        /* ボタン：ホバー時の影も板画風のズレに変更 */
        a:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #5d2e0d; }

        /* ログインボタン：えんじ色 */
        .btn-login {
            background: #a04040;
            color: #fff;
            box-shadow: 4px 4px 0px #5d2e0d;
        }
        /* 新規登録ボタン：茶色の枠線 */
        .btn-register {
            background: transparent;
            color: #8b4513;
            border: 2px solid #8b4513;
            box-shadow: 4px 4px 0px rgba(139, 69, 19, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎰 古町レトロ・ガチャウォーク</h1>
        <p>古町の隠れた名店をガチャで発見しよう！</p>
        <div class="buttons">
            <a href="pages/login.html" class="btn-login">ログイン</a>
            <a href="pages/register.html" class="btn-register">新規登録</a>
        </div>
    </div>
</body>
</html>
